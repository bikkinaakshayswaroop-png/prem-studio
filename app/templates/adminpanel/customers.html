{% extends 'adminpanel/base.html' %}

{% block title %}
Customers
{% endblock %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4">👥 Customers</h2>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover">

                <thead>

                    <tr>

                        <th>Username</th>
                        <th>Email</th>
                        <th>Date Joined</th>

                    </tr>

                </thead>

                <tbody>

                    {% for user in users %}

                    <tr>

                        <td>{{ user.username }}</td>

                        <td>{{ user.email }}</td>

                        <td>{{ user.date_joined|date:"d M Y" }}</td>

                    </tr>

                    {% empty %}

                    <tr>

                        <td colspan="3">

                            No Customers Found

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
