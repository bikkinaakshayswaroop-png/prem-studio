{% load static %}
<!DOCTYPE html>
<html>

<head>

    <title>{% block title %}Prem Studio Admin{% endblock %}</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#eef2f7;

            font-family:'Segoe UI',sans-serif;

        }

        .sidebar{

            position:fixed;

            width:260px;

            height:100vh;

            background:linear-gradient(180deg,#0f172a,#1e293b);

            color:white;

            overflow:auto;

        }

        .logo{

            text-align:center;

            padding:30px 20px;

            border-bottom:1px solid rgba(255,255,255,.1);

        }

        .logo h3{

            font-weight:bold;

            margin-top:10px;

        }

        .logo p{

            font-size:13px;

            color:#cbd5e1;

        }

        .sidebar a{

            display:flex;

            align-items:center;

            gap:12px;

            color:#e2e8f0;

            text-decoration:none;

            padding:15px 25px;

            transition:.3s;

            font-size:16px;

        }

        .sidebar a:hover{

            background:#2563eb;

            color:white;

            padding-left:35px;

        }

        .sidebar a i{

            font-size:18px;

        }

        .content{

            margin-left:260px;

            padding:35px;

        }

        .topbar{

            background:white;

            border-radius:18px;

            padding:20px;

            box-shadow:0 5px 20px rgba(0,0,0,.08);

            margin-bottom:30px;

            display:flex;

            justify-content:space-between;

            align-items:center;

        }

        .card{

            border:none;

            border-radius:18px;

            box-shadow:0 8px 20px rgba(0,0,0,.08);

        }

        .profile{

            font-weight:bold;

        }

    </style>

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <h3>📸 Prem Studio</h3>

        <p>Photography Management</p>

    </div>

    <a href="{% url 'admin_dashboard' %}">
        <i class="bi bi-speedometer2"></i>
        Dashboard
    </a>

    <a href="{% url 'customers' %}">
        <i class="bi bi-people-fill"></i>
        Customers
    </a>

    <a href="{% url 'admin_bookings' %}">
        <i class="bi bi-calendar-event-fill"></i>
        Bookings
    </a>

    <a href="{% url 'gallery_manager' %}">
        <i class="bi bi-images"></i>
        Gallery
    </a>

    <a href="#">
        <i class="bi bi-folder2-open"></i>
        Albums
    </a>

    <a href="{% url 'video_manager' %}">
    <i class="bi bi-camera-video"></i>
    Videos
</a>

    <a href="#">
        <i class="bi bi-bar-chart-fill"></i>
        Analytics
    </a>

    <a href="#">
        <i class="bi bi-cloud-arrow-up-fill"></i>
        Cloudinary
    </a>

    <a href="#">
        <i class="bi bi-gear-fill"></i>
        Settings
    </a>

</div>

<div class="content">

    <div class="topbar">

        <h4>
            👋 Welcome Admin
        </h4>

        <div class="profile">

            📸 Prem Studio

        </div>

    </div>

    {% block content %}

    {% endblock %}

</div>

</body>

</html>
