{% extends 'base.html' %}

{% block title %}
Register | Prem Studio
{% endblock %}

{% block content %}

<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg border-0 rounded-4 p-5">

                <h2 class="text-center mb-4">
                    Create Your Account
                </h2>

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">
                        <input type="text"
                               name="username"
                               class="form-control"
                               placeholder="Username"
                               required>
                    </div>

                    <div class="mb-3">
                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Email"
                               required>
                    </div>

                    <div class="mb-4">
                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Password"
                               required>
                    </div>

                    <button type="submit"
                            class="btn btn-warning w-100 py-3">

                        Create Account

                    </button>

                </form>

                <p class="text-center mt-4">

                    Already have an account?

                    <a href="/login/">Login</a>

                </p>

            </div>

        </div>

    </div>

</section>

{% endblock %}
