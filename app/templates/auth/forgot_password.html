{% extends 'base.html' %}

{% block title %}
Forgot Password
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    Forgot Password
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <input
                        type="email"
                        name="email"
                        class="form-control mb-3"
                        placeholder="Enter your email"
                        required
                    >

                    <button
                        class="btn btn-dark w-100">
                        Send OTP
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
